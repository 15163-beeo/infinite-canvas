    <!-- ★品牌升级弹窗：生产仅 picsetai.com 生效。登录/未登录用户都弹不可关弹窗，
       点「开启 Picell AI」跳 picell.ai（登录的带 token 保持登录态，未登录的直接跳）。
       其他域名/品牌/环境（.cn/picell/test/本地）完全不触发。

       本地/测试预览（仅非 picsetai.com 域生效，生产用户碰不到）：
         localStorage.setItem('__upgradePreview','1')   // 开启预览
         localStorage.setItem('__upgradeTarget','http://localhost:8081')  // 可选：覆盖跳转目标
         或在 URL 加 ?upgradePreview=1
       关闭：localStorage.removeItem('__upgradePreview') -->
    <script>
      (function () {
        try {
          var host = location.hostname.replace(/^www\./, '');
          var isProd = host === 'picsetai.com';
          var preview =
            !isProd &&
            (location.search.indexOf('upgradePreview=1') >= 0 ||
              localStorage.getItem('__upgradePreview') === '1');
          if (!isProd && !preview) return; // 严格限定：非生产域且未开预览 → 不触发
          // 跳转目标：生产固定 picell.ai；预览可用 __upgradeTarget 覆盖（指向本地/测试站）
          window.__PICSET_UPGRADE_TARGET__ =
            (preview && localStorage.getItem('__upgradeTarget')) || 'https://picell.ai';
          // 登录/未登录都弹升级弹窗（不再即时跳转）
          window.__PICSET_UPGRADE__ = true;
        } catch (e) {}
      })();
    </script>

        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];

          dataLayer.push(arguments);
        }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', id);
      })();
    </script>

  <body>
    <div id="root"></div>
    <!-- www → 裸域迁移：发送端（必须在 ES module 之前执行） -->
    <script>
      (function () {
        if (location.hostname !== 'www.picell.ai') return;
        var p = location.pathname,
          s = location.search,
          h = location.hash;
        for (var i = 0; i < localStorage.length; i++) {
          var key = localStorage.key(i);
          if (key && key.indexOf('sb-') === 0 && key.indexOf('-auth-token') > 0) {
            try {
              var obj = JSON.parse(localStorage.getItem(key));
              if (obj && obj.access_token && obj.refresh_token) {
                var payload = encodeURIComponent(obj.access_token + '|' + obj.refresh_token);
                location.replace('https://picell.ai' + p + s + '#_migrate=' + payload);
                return;
              }
            } catch (e) {
              /* ignore */
            }
          }
        }
        location.replace('https://picell.ai' + p + s + h);
      })();
    </script>
  </body>
